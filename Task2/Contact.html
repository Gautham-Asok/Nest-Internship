<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar">

      <div class="container-fluid">

        <a class="navbar-brand text-white fw-bold" href="#">
          Ministers
        </a>

        <button class="navbar-toggler bg-white"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

          <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse justify-content-end"
        id="navbarNav">

          <ul class="navbar-nav">

            <li class="nav-item">
              <a class="nav-link text-white" href="Home.html">
                Home
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-white" href="Minister.html">
                Ministers
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-white active" href="Contact.html">
                Contact
              </a>
            </li>

          </ul>

        </div>

      </div>

    </nav>

    <!-- Contact Section -->
    <div class="container mt-5">

        <div class="card shadow-lg border-0 p-5">

            <h1 class="text-center text-primary fw-bold mb-4">
                Contact Us
            </h1>

            <p class="text-center mb-5">
                Welcome to Help Line. Feel free to contact us
                for any information, support, or enquiries.
            </p>

            <div class="row">

                <!-- Contact Details -->
                <div class="col-md-6">

                    <h4 class="mb-3">Office Details</h4>

                    <p>
                        <strong>Address:</strong><br>
                        Secretariat Office,<br>
                        Kerala, India
                    </p>

                    <p>
                        <strong>Phone:</strong><br>
                        +91 9876543210
                    </p>

                    <p>
                        <strong>Email:</strong><br>
                        helpguide@gmail.com
                    </p>

                </div>

                <!-- Contact Form -->
                <div class="col-md-6">

                    <h4 class="mb-3">Send Message</h4>

                    <form>

                        <div class="mb-3">
                            <input type="text"
                            class="form-control"
                            placeholder="Enter your name">
                        </div>

                        <div class="mb-3">
                            <input type="email"
                            class="form-control"
                            placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <textarea class="form-control"
                            rows="5"
                            placeholder="Enter your message"></textarea>
                        </div>

                        <button class="btn btn-primary">
                            Send Message
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
